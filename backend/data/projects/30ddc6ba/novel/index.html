<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{NOVEL_TITLE}} - NovelCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{NOVEL_DESCRIPTION}}">

  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="./styles/theme.css">

  <!-- Dark mode support -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">

  <!-- Custom fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --theme-color: #8b7355;
      --theme-color-dark: #6b5a47;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      // Basic config
      name: '{{NOVEL_TITLE}}',
      repo: '',
      loadSidebar: '_sidebar.md',
      loadNavbar: false,
      homepage: 'README.md',

      // Navigation
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      hideSidebar: false,

      // Search
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索内容',
        noData: '没有找到结果',
        depth: 6,
      },

      // Word count
      count: {
        countable: true,
        fontsize: '0.85em',
        color: 'rgb(90,90,90)',
        language: 'chinese',
      },

      // Pagination
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      },

      // External links
      externalLinkTarget: '_blank',

      // Router
      routerMode: 'hash',

      // Plugins
      plugins: [
        // Chapter numbering
        function(hook, vm) {
          hook.beforeEach(function(content) {
            const file = vm.route.file;
            if (file && file.includes('chapters/')) {
              const match = file.match(/chapters\/(\d+)/);
              if (match) {
                const num = parseInt(match[1]);
                const chapterTitle = `## 第${num}章\n\n`;
                return chapterTitle + content;
              }
            }
            return content;
          });
        },

        // Word count sync to parent
        function(hook, vm) {
          hook.doneEach(function() {
            const main = document.querySelector('#main');
            if (main) {
              const text = main.innerText || '';
              const wordCount = text.replace(/\s/g, '').length;

              if (window.parent !== window) {
                window.parent.postMessage({
                  type: 'wordCount',
                  count: wordCount,
                  path: vm.route.path,
                }, '*');
              }
            }
          });
        },

        // Reading progress
        function(hook, vm) {
          hook.doneEach(function() {
            const progress = document.createElement('div');
            progress.className = 'reading-progress';
            progress.style.cssText = `
              position: fixed;
              top: 0;
              left: 0;
              height: 3px;
              background: var(--theme-color, #8b7355);
              transition: width 0.2s;
              z-index: 9999;
            `;

            if (!document.querySelector('.reading-progress')) {
              document.body.appendChild(progress);
            }

            window.addEventListener('scroll', function() {
              const scrollTop = window.scrollY;
              const docHeight = document.documentElement.scrollHeight - window.innerHeight;
              const scrollPercent = (scrollTop / docHeight) * 100;
              progress.style.width = scrollPercent + '%';
            });
          });
        },
      ],
    };
  </script>

  <!-- Docsify core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-count@latest/dist/count.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>

  <!-- External link icon -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>

  <!-- Embed mode communication -->
  <script>
    (function() {
      // Listen for parent messages
      window.addEventListener('message', function(e) {
        const { type, path, content } = e.data || {};

        switch (type) {
          case 'navigate':
            if (path) {
              window.location.hash = path;
            }
            break;
          case 'getContent':
            // Return current content
            const main = document.querySelector('#main');
            if (main && window.parent !== window) {
              window.parent.postMessage({
                type: 'contentResponse',
                content: main.innerText,
              }, '*');
            }
            break;
          case 'setTheme':
            document.body.classList.toggle('dark', e.data.dark);
            break;
        }
      });

      // Notify parent when ready
      if (window.parent !== window) {
        window.addEventListener('load', function() {
          window.parent.postMessage({ type: 'docsifyReady' }, '*');
        });
      }
    })();
  </script>
</body>
</html>
