version: '3.8'

services:
  # Neo4j - Knowledge Graph (Optional)
  neo4j:
    image: neo4j:5.15-community
    container_name: novelcraft-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-novelcraft123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - full

  # Qdrant - Vector Store (Optional)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: novelcraft-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - full

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novelcraft-backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-novelcraft123}
      QDRANT_URL: http://qdrant:6333
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4}
      PROJECTS_DATA_DIR: /app/data/projects
    volumes:
      - ./backend:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - backend

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novelcraft-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    profiles:
      - frontend

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  default:
    name: novelcraft-network